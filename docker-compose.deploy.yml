services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    ports:
      - '${DB_PUBLIC_PORT:-5433}:5432'
    environment:
      POSTGRES_USER: ${DB_USERNAME:-raguser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-ragdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-raguser} -d ${DB_NAME:-ragdb}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '${REDIS_PUBLIC_PORT:-6380}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '${BACKEND_PUBLIC_PORT:-3101}:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-raguser}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-ragdb}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-true}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-this-super-secret}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1h}
      CHUNK_SIZE: ${CHUNK_SIZE:-1000}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-200}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODELS: ${OPENROUTER_MODELS:-meta-llama/llama-3.2-3b-instruct:free,meta-llama/llama-3.3-70b-instruct:free,qwen/qwen3-coder:free}
      OPENROUTER_REFERER: ${OPENROUTER_REFERER:-https://example.com}
      OPENROUTER_TITLE: ${OPENROUTER_TITLE:-RAG Backend}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3101}
        NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-false}
    restart: unless-stopped
    ports:
      - '${FRONTEND_PUBLIC_PORT:-3100}:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      backend:
        condition: service_started

  pgadmin:
    image: dpage/pgadmin4:8
    restart: unless-stopped
    ports:
      - '${PGADMIN_PORT:-5050}:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change-this-password}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  pgadmin_data:
